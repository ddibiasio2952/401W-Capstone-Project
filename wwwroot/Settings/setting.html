<!DOCTYPE html>
<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="setting.css">
    <script type="text/javascript" src="settings.js" defer></script>
</head>
<body>
    <header id="topbar">
        <div class="header-left">
            <a href="https://localhost:7288/Dashboard/dashboard.html">
                <img src="../image/white-fig-logo.webp" alt="Logo">
            </a>
        </div>
        <div class="header-center">
            <select id="nav-select" class="company-select">
                <option selected>State</option>
                <option>Location</option>
            </select>
            <input id="nav-search" type="search" placeholder="Enter Query" class="search-bar">
            <button id="search-btn" onclick="enterSearch()">
                <img src="../image/search.png" alt="search" width="20" />
            </button>
        </div>
        <div class="header-right">
            <span id="username-topbar">Username123</span>
            <button id="profile-picture">
                <img src="../image/user logo.png">
            </button>

            <div id="user-modal" class="modal-topbar">
                <div class="modal-content-topbar">
                    <button id="signout-btn" onclick="signOut()">
                        Sign Out
                    </button>
                </div>
            </div>
            
        </div>
    </header>

    <div class="content-wrapper">
        <aside>
            <nav id="sidebar-nav">
                <button id="back-btn" onclick="goBack()"> &larr; Go Back</button>
                <div id="sidebar">
                    <ul>
                        <li class="active">
                            <a>      
                                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M480-440q-59 0-99.5-40.5T340-580q0-59 40.5-99.5T480-720q59 0 99.5 40.5T620-580q0 59-40.5 99.5T480-440Zm0-80q26 0 43-17t17-43q0-26-17-43t-43-17q-26 0-43 17t-17 43q0 26 17 43t43 17Zm0 440q-139-35-229.5-159.5T160-516v-244l320-120 320 120v244q0 152-90.5 276.5T480-80Zm0-400Zm0-315-240 90v189q0 54 15 105t41 96q42-21 88-33t96-12q50 0 96 12t88 33q26-45 41-96t15-105v-189l-240-90Zm0 515q-36 0-70 8t-65 22q29 30 63 52t72 34q38-12 72-34t63-52q-31-14-65-22t-70-8Z"/></svg>
                                <span>Privacy</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
        </aside>

        <main>
            <div id="session-container" class="container">
                <h1>Session Management</h1>

                <div class="table-wrapper">
                    <table id="sessions-table">
                        <thead>
                            <tr id="sessions-header">
                                <th id="user-agent">User Agent</th>
                                <th>Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                    
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="login-audit-container" class="container">
                <h1>Login Audit</h1>

                <div class="table-wrapper">
                    <table id="login-audit-table">
                        <thead>
                            <tr id="audit-header">
                                <th>Event</th>
                                <th>User Agent</th>
                                <th>IP</th>
                            </tr>
                        </thead>
                        <tbody>
                            
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
     
     <script src="/validate-session/validator.js"></script>
     <script src="../Navbar/topbar-search.js"></script>
</body>
</html>
