                        <p class="page-subtitle">
                            View and filter all open claims across all companies.
                        </p>
                    </div>
                </header>

                <!-- Filter Row -->
                <section class="filter-row">
                    <div class="filter-group">
                        <label>Status</label>
                        <select id="statusFilter">
                            <option value="all">All</option>
                            <option value="open">Open</option>
                            <option value="closed">Closed</option>
                            <option value="pending">Pending</option>
                        </select>
                    </div>

                    <div class="filter-group wide">
                        <label>Search</label>
                        <input id="searchBar"
                               type="search"
                               placeholder="Claim number or insured name…" />
                    </div>
                </section>

                <!-- Claims Table -->
                <section class="claims-panel">
                    <table class="claims-table">
                        <thead>
                            <tr>
                                <th>Claim #</th>
                                <th>Insured</th>
                                <th>Policy #</th>
                                <th>Status</th>
                                <th>Opened</th>
                                <th>View</th>
                            </tr>
                        </thead>
                        <tbody id="claimsTableBody"></tbody>
